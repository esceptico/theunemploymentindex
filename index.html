<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Unemployment Index</title>
  <meta name="description" content="A fictional AI doom-quote generator. All quotes are parody.">
  <meta property="og:title" content="AI Unemployment Index">
  <meta property="og:description" content="AI will destroy X% of Y in Z. A fictional quote generator.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%93%89%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <div class="slot slot--quote">
      <p class="quote" aria-live="polite">
        AI will destroy
        <span class="pct">94% of</span>
        <span class="job">baristas</span>
        <span class="time">in the next 3 weeks</span>.
      </p>
    </div>
    <div class="slot slot--attr">
      <p class="attribution">
        &mdash; <span class="attr">Dario Amodoom</span>, 2026
      </p>
    </div>
    <button class="regen" type="button" aria-label="Generate new doom">regenerate</button>
  </main>
  <footer>
    <span>all quotes fictional</span>
    <span class="sep">&middot;</span>
    <button class="share" type="button">share &#8599;</button>
    <span class="toast" aria-live="polite" hidden>link copied</span>
  </footer>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
